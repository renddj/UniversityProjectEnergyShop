<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — ЭнергоМаркет</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container">
        <a class="logo" href="index.html">⚡ ЭнергоМаркет</a>
        <nav>
            <a href="index.html">Товары</a>
            <a href="about.html">О компании</a>
            <a href="delivery.html">Доставка и оплата</a>
            <a href="cart.html" id="nav-cart" style="display:none">🛒 Корзина</a>
            <a href="admin.html" id="nav-admin" style="display:none">⚙️ Админ</a>
            <span id="nav-auth"></span>
        </nav>
    </div>
</header>

<div class="container">
    <h2 class="page-title" style="margin-top:28px;">⚙️ Панель администратора</h2>
    <p id="access-error" class="error-msg" style="display:none; margin-top:12px;"></p>

    <div id="admin-content" style="display:none">

        <!-- Форма добавления товара -->
        <div class="form-card" style="max-width:700px; margin: 24px 0;">
            <h3 id="form-title">Добавить товар</h3>

            <!-- Скрытое поле ID для режима редактирования -->
            <input type="hidden" id="edit-id">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="f-name" placeholder="VOLT ZERO Классик">
                </div>
                <div class="form-group">
                    <label>Бренд</label>
                    <input type="text" id="f-brand" placeholder="VOLT ZERO">
                </div>
                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="f-price" placeholder="129">
                </div>
                <div class="form-group">
                    <label>Объём</label>
                    <input type="text" id="f-volume" placeholder="0.5л">
                </div>
            </div>

            <div class="form-group">
                <label>Краткое описание (для списка товаров)</label>
                <input type="text" id="f-short" placeholder="Не более 200 символов">
            </div>
            <div class="form-group">
                <label>Полное описание (для страницы товара)</label>
                <textarea id="f-full" rows="4" placeholder="Подробное описание товара..."></textarea>
            </div>
            <div class="form-group">
                <label>URL изображения</label>
                <input type="text" id="f-image" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>В наличии</label>
                <select id="f-stock">
                    <option value="1">Да</option>
                    <option value="0">Нет</option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:8px;">
                <button class="btn btn-red" onclick="saveProduct()">💾 Сохранить</button>
                <button class="btn btn-gray" onclick="resetForm()" id="btn-cancel" style="display:none">Отмена</button>
            </div>
            <p id="form-msg" class="success-msg" style="display:none"></p>
            <p id="form-error" class="error-msg" style="display:none"></p>
        </div>

        <!-- Таблица товаров -->
        <h3>Список товаров</h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Фото</th>
                    <th>Название</th>
                    <th>Бренд</th>
                    <th>Цена</th>
                    <th>Наличие</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="products-table-body">
                <tr><td colspan="7">Загрузка...</td></tr>
            </tbody>
        </table>

    </div>
</div>

<footer>
    <div class="container">© 2024 ЭнергоМаркет. Учебный проект.</div>
</footer>

<script src="js/api.js"></script>
<script>
    // Проверка доступа — только администратор
    document.addEventListener("DOMContentLoaded", () => {
        if (!isLoggedIn()) {
            window.location.href = "login.html";
            return;
        }
        if (!isAdmin()) {
            document.getElementById("access-error").textContent = "Доступ запрещён. Эта страница только для администраторов.";
            document.getElementById("access-error").style.display = "block";
            return;
        }
        document.getElementById("admin-content").style.display = "block";
        loadProducts();
    });

    async function loadProducts() {
        const products = await apiRequest("GET", "/api/products");
        const tbody = document.getElementById("products-table-body");
        tbody.innerHTML = products.map(p => `
            <tr>
                <td>${p.id}</td>
                <td><img src="${p.image_url}" alt="${p.name}"></td>
                <td>${p.name}</td>
                <td>${p.brand}</td>
                <td>${p.price} ₽</td>
                <td>
                    <span class="badge ${p.in_stock ? 'badge-instock' : 'badge-outofstock'}">
                        ${p.in_stock ? "Есть" : "Нет"}
                    </span>
                </td>
                <td>
                    <button class="btn btn-dark btn-small" onclick="editProduct(${p.id})">✏️ Изменить</button>
                    <button class="btn btn-danger btn-small" onclick="deleteProduct(${p.id}, '${p.name}')">🗑️ Удалить</button>
                </td>
            </tr>
        `).join("");
    }

    async function saveProduct() {
        const editId = document.getElementById("edit-id").value;
        const msgEl  = document.getElementById("form-msg");
        const errEl  = document.getElementById("form-error");
        msgEl.style.display = "none";
        errEl.style.display = "none";

        const data = {
            name:              document.getElementById("f-name").value.trim(),
            brand:             document.getElementById("f-brand").value.trim(),
            price:             parseFloat(document.getElementById("f-price").value),
            volume:            document.getElementById("f-volume").value.trim(),
            short_description: document.getElementById("f-short").value.trim(),
            full_description:  document.getElementById("f-full").value.trim(),
            image_url:         document.getElementById("f-image").value.trim(),
            in_stock:          parseInt(document.getElementById("f-stock").value),
        };

        // Простая валидация
        for (const [key, val] of Object.entries(data)) {
            if (val === "" || (typeof val === "number" && isNaN(val))) {
                errEl.textContent = "Заполните все поля!";
                errEl.style.display = "block";
                return;
            }
        }

        try {
            if (editId) {
                await apiRequest("PUT", `/api/products/${editId}`, data);
                msgEl.textContent = "✅ Товар обновлён!";
            } else {
                await apiRequest("POST", "/api/products", data);
                msgEl.textContent = "✅ Товар добавлен!";
            }
            msgEl.style.display = "block";
            resetForm();
            loadProducts();
        } catch (e) {
            errEl.textContent = "Ошибка: " + e.message;
            errEl.style.display = "block";
        }
    }

    async function editProduct(id) {
        // Загружаем данные товара и заполняем форму
        const p = await apiRequest("GET", `/api/products/${id}`);
        document.getElementById("edit-id").value  = p.id;
        document.getElementById("f-name").value   = p.name;
        document.getElementById("f-brand").value  = p.brand;
        document.getElementById("f-price").value  = p.price;
        document.getElementById("f-volume").value = p.volume;
        document.getElementById("f-short").value  = p.short_description;
        document.getElementById("f-full").value   = p.full_description;
        document.getElementById("f-image").value  = p.image_url;
        document.getElementById("f-stock").value  = p.in_stock;

        document.getElementById("form-title").textContent = `Редактировать товар #${p.id}`;
        document.getElementById("btn-cancel").style.display = "inline";

        // Прокрутка к форме
        document.querySelector(".form-card").scrollIntoView({ behavior: "smooth" });
    }

    async function deleteProduct(id, name) {
        if (!confirm(`Удалить товар "${name}"?`)) return;
        try {
            await apiRequest("DELETE", `/api/products/${id}`);
            loadProducts();
        } catch (e) {
            alert("Ошибка удаления: " + e.message);
        }
    }

    function resetForm() {
        document.getElementById("edit-id").value = "";
        ["f-name","f-brand","f-price","f-volume","f-short","f-full","f-image"].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById("f-stock").value = "1";
        document.getElementById("form-title").textContent = "Добавить товар";
        document.getElementById("btn-cancel").style.display = "none";
    }
</script>

</body>
</html>
