<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ЭнергоМаркет</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" ></script>
</head>
<body>

<header>
    <div class="container">
        <a class="logo" href="index.html">⚡ ЭнергоМаркет</a>
                <nav>
            <a href="index.html">Товары</a>
            <a href="about.html">О компании</a>
            <a href="delivery.html">Доставка и оплата</a>
            <a href="cart.html" class="nav-cart-link">🛒 Корзина <span id="cart-badge" class="cart-badge" style="display:none">0</span></a>
            <span id="nav-auth"></span>
        </nav>
    </div>
</header>

<div class="container">

    <!-- Переключатель Вход / Регистрация -->
    <div style="display:flex; gap:10px; margin-top:40px; justify-content:center;">
        <button class="btn btn-red" id="tab-login" onclick="showTab('login')">Вход</button>
        <button class="btn btn-gray" id="tab-register" onclick="showTab('register')">Регистрация</button>
    </div>

    <!-- Форма входа -->
    <div class="form-card" id="form-login">
        <h2>Вход в аккаунт</h2>
        <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="example@mail.ru">
        </div>
        <div class="form-group">
            <label for="login-password">Пароль</label>
            <input type="password" id="login-password" placeholder="Ваш пароль">
        </div>
        <button class="btn btn-red" onclick="doLogin()" style="width:100%">Войти</button>
        <p id="login-error" class="error-msg" style="display:none"></p>
    </div>

    <!-- Форма регистрации -->
    <div class="form-card" id="form-register" style="display:none">
        <h2>Регистрация</h2>
        <div class="form-group">
            <label for="reg-username">Имя пользователя</label>
            <input type="text" id="reg-username" placeholder="Например: ivan123">
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="example@mail.ru">
        </div>
        <div class="form-group">
            <label for="reg-password">Пароль</label>
            <input type="password" id="reg-password" placeholder="Минимум 6 символов">
        </div>
        <button class="btn btn-red" onclick="doRegister()" style="width:100%">Зарегистрироваться</button>
        <p id="reg-error" class="error-msg" style="display:none"></p>
        <p id="reg-success" class="success-msg" style="display:none"></p>
    </div>

</div>

<footer>
    <div class="container" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; align-items:center;">
        <span>© 2025 ЭнергоМаркет. Учебный проект.</span>
        <div style="display:flex; gap:20px; font-size:13px;">
            <a href="delivery.html">Доставка и оплата</a>
            <a href="about.html">О компании</a>
            <a href="about.html#contacts">Контакты</a>
        </div>
    </div>
</footer>

<script>
    function showTab(tab) {
        document.getElementById("form-login").style.display    = tab === "login"    ? "block" : "none";
        document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
        document.getElementById("tab-login").className    = "btn " + (tab === "login"    ? "btn-red" : "btn-gray");
        document.getElementById("tab-register").className = "btn " + (tab === "register" ? "btn-red" : "btn-gray");
    }

    async function doLogin() {
        const email    = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const errEl    = document.getElementById("login-error");

        if (!email || !password) {
            errEl.textContent = "Заполните все поля";
            errEl.style.display = "block";
            return;
        }

        try {
            const data = await apiRequest("POST", "/api/login", { email, password });
            saveAuth(data.token, data.username, data.role);
            window.location.href = "index.html"; // После входа — на главную
        } catch (e) {
            errEl.textContent = e.message;
            errEl.style.display = "block";
        }
    }

    async function doRegister() {
        const username = document.getElementById("reg-username").value.trim();
        const email    = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-password").value;
        const errEl    = document.getElementById("reg-error");
        const sucEl    = document.getElementById("reg-success");

        errEl.style.display = "none";
        sucEl.style.display = "none";

        if (!username || !email || !password) {
            errEl.textContent = "Заполните все поля";
            errEl.style.display = "block";
            return;
        }

        if (password.length < 6) {
            errEl.textContent = "Пароль должен быть не менее 6 символов";
            errEl.style.display = "block";
            return;
        }

        try {
            const data = await apiRequest("POST", "/api/register", { username, email, password });
            saveAuth(data.token, data.username, data.role);
            window.location.href = "index.html";
        } catch (e) {
            errEl.textContent = e.message;
            errEl.style.display = "block";
        }
    }

    // Если уже авторизован — перенаправляем
    if (isLoggedIn()) window.location.href = "index.html";
</script>

</body>
</html>
