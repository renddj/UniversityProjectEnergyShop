<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — ЭнергоМаркет</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container">
        <a class="logo" href="index.html">⚡ ЭнергоМаркет</a>
        <nav>
            <a href="index.html">Товары</a>
            <a href="about.html">О компании</a>
            <a href="delivery.html">Доставка и оплата</a>
            <a href="cart.html" class="nav-cart-link">🛒 Корзина <span id="cart-badge" class="cart-badge" style="display:none">0</span></a>
            <a href="admin.html" id="nav-admin" style="display:none">⚙️ Админ</a>
            <span id="nav-auth"></span>
        </nav>
    </div>
</header>

<div class="container">
    <h2 class="page-title" style="margin-top:28px;">🛒 Корзина</h2>
    <div id="cart-container"><p>Загрузка...</p></div>
</div>

<footer>
    <div class="container" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; align-items:center;">
        <span>© 2025 ЭнергоМаркет. Учебный проект.</span>
        <div style="display:flex; gap:20px; font-size:13px;">
            <a href="delivery.html">Доставка и оплата</a>
            <a href="about.html">О компании</a>
        </div>
    </div>
</footer>

<script src="js/api.js"></script>
<script>
    async function loadCart() {
        let items = [];

        if (isLoggedIn()) {
            try { items = await apiRequest("GET", "/api/cart"); }
            catch (e) {
                document.getElementById("cart-container").innerHTML =
                    `<p style="color:red">Ошибка загрузки корзины: ${e.message}</p>`;
                return;
            }
        } else {
            items = getGuestCart();
        }

        const container = document.getElementById("cart-container");

        if (items.length === 0) {
            container.innerHTML = `
                <p style="margin-top:20px; color:#777;">Корзина пуста.</p>
                <a href="index.html" class="btn btn-red" style="margin-top:12px; display:inline-block;">Перейти к товарам</a>
            `;
            return;
        }

        const subtotal = items.reduce((sum, item) => sum + item.product.price * item.quantity, 0);
        const freeDelivery = subtotal >= 1000;

        container.innerHTML = items.map(item => `
            <div class="cart-item" id="cart-item-${item.cart_item_id}">
                <img src="${item.product.image_url}" alt="${item.product.name}">
                <div class="cart-item-info">
                    <h3><a href="product.html?id=${item.product.id}">${item.product.name}</a></h3>
                    <p style="font-size:13px; color:#888;">${item.product.brand} · ${item.product.volume}</p>
                    <p class="price">${item.product.price} ₽ × ${item.quantity} шт.</p>
                </div>
                <div style="text-align:right;">
                    <p style="font-weight:bold; margin-bottom:8px;">${(item.product.price * item.quantity).toFixed(0)} ₽</p>
                    <button class="btn btn-danger btn-small" onclick="removeItem('${item.cart_item_id}', ${item.product.id})">Удалить</button>
                </div>
            </div>
        `).join("") + `
            <div style="background:white; border-radius:6px; padding:20px; box-shadow:0 1px 4px rgba(0,0,0,0.1); margin-top:4px;">
                ${freeDelivery
                    ? `<p style="color:#2a9d2a; font-size:14px; margin-bottom:10px;">🎁 Бесплатная доставка при заказе от 1000 ₽ — у вас есть!</p>`
                    : `<p style="color:#888; font-size:14px; margin-bottom:10px;">До бесплатной доставки осталось: <strong>${(1000 - subtotal).toFixed(0)} ₽</strong></p>`
                }
                <div class="cart-total">Итого: ${subtotal.toFixed(0)} ₽</div>
                <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                    <a href="checkout.html" class="btn btn-red">Оформить заказ →</a>
                    <a href="index.html" class="btn btn-gray">Продолжить покупки</a>
                    ${!isLoggedIn() ? `<p style="font-size:13px; color:#888; margin-top:10px; width:100%;">💡 <a href="login.html">Войдите</a>, чтобы история заказов сохранялась в личном кабинете.</p>` : ""}
                </div>
            </div>
        `;
    }

    async function removeItem(cartItemId, productId) {
        if (isLoggedIn()) {
            try {
                await apiRequest("DELETE", `/api/cart/${cartItemId}`);
            } catch (e) { alert("Ошибка: " + e.message); return; }
        } else {
            removeFromGuestCart(productId);
        }
        loadCart();
    }

    loadCart();
</script>

</body>
</html>
